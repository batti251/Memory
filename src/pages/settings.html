<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory - Settings</title>
</head>
<body>
       <main class="main__wrap">


                <header class="settings">
            <article class="settings__headlines">
                <h1 class="settings__headlines-h1">Settings</h1>
                <img src="./../public/icons/line_wand.svg" alt="yellow_underline_wand-look-alike">
            </article>
        </header>


        <section class="settings__wrap">

    
        <section >


        <section class="settings__radio">
            <article class="settings__headlines settings__headlines--game ">
                <img src="" alt="">
                <h2 class="settings__headlines-h2">Game themes</h2>
            </article>
            <ul class="settings__inputs">
                <li class="settings__inputs-radio"><label class="label label--radio"><input type="radio" name="game-theme" id="theme-1" data-preview="code"><span class="label">Code vibes theme</span></label></li>
                <li class="settings__inputs-radio"><label class="label label--radio"><input type="radio" name="game-theme" id="theme-2" data-preview="game"><span class="label">Gaming theme</span></label></li>
                <li class="settings__inputs-radio"><label class="label label--radio"><input type="radio" name="game-theme" id="theme-3" data-preview="da"><span class="label">DA Projects theme</label></div>
                <li class="settings__inputs-radio"><label class="label label--radio"><input type="radio" name="game-theme" id="theme-4" data-preview="food"><span class="label">Foods theme</span></label></li>
            </article>
        </section>

        <section class="settings__radio">
            <article class="settings__headlines settings__headlines--player">
                <img src="" alt="">
                <h2 class="settings__headlines-h2">Choose player</h2>
            </article>
            <ul class="settings__inputs">
                <li class="settings__inputs-radio"><label class="label label--radio"><input type="radio" name="player-color" id="color-blue" data-preview="blue"><span class="label">Blue</span></label></li>
                <li class="settings__inputs-radio"><label class="label label--radio"><input type="radio" name="player-color" id="color-orange" data-preview="orange"><span class="label">Orange</span></label></li>
        </ul>
        </section>

        <section class="settings__radio">
            <article class="settings__headlines settings__headlines--board">-
                <img src="" alt="">
                <h2 class="settings__headlines-h2">Board size</h2>
            </article>
            <ul class="settings__inputs">
                <li class="settings__inputs-radio"><label class="label label--radio"><input type="radio" name="board-size" id="board-1" data-preview="4"><span class="label">16 cards</span></label></li>
                <li class="settings__inputs-radio"><label class="label label--radio"><input type="radio" name="board-size" id="board-2" data-preview="24"><span class="label">24 cards</span></label></li>
                <li class="settings__inputs-radio"><label class="label label--radio"><input type="radio" name="board-size" id="board-3" data-preview="36"><span class="label">36 cards</span></label></li>
            </ul>
            
        </section>
        </section>
        <section class="settings__preview">
        <figure id="img-preview"></figure>
        
        <aside class="settings__bar">
          <ul class="settings__bar-list">
            <li class="settings__bar-list-point">Game theme</li>
            <li class="settings__bar-list-point">Player</li>
            <li class="settings__bar-list-point">Board size</li>
          </ul>
          <button id="btn-start" class="btn btn--start-game">
            <img src="./../public/icons/play_0deg.svg" alt="play_button">
            Start
          </button>
        </aside>
        </section>

            </section>

        <script type="module" src="/src/main.ts"></script>
</body>
</html>
